<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="E-Learning STMIK KAPUTAMA">

  <!-- PENTING: viewport untuk mobile responsif -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="E-Learning STMIK KAPUTAMA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>E-Learning STMIK KAPUTAMA</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F2F2F2;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #F2F2F2;
      z-index: 9999;
    }
    #loading h2 {
      font-family: Arial, sans-serif;
      font-size: 20px;
      color: #1565C0;
      margin-top: 16px;
      font-weight: bold;
    }
    #loading p {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #888888;
      margin-top: 6px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E3F2FD;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    flt-glass-pane {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>E-Learning STMIK KAPUTAMA</h2>
    <p>Memuat aplikasi...</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
